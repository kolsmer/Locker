apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: locker-backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: DB_USER
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: PORT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: locker-config
                  key: ENVIRONMENT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: locker-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: locker-secrets
                  key: JWT_SECRET
            - name: YOOKASSA_SHOP_ID
              valueFrom:
                secretKeyRef:
                  name: locker-secrets
                  key: YOOKASSA_SHOP_ID
            - name: YOOKASSA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: locker-secrets
                  key: YOOKASSA_API_KEY
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
