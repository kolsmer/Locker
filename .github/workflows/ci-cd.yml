name: ci-cd

on:
  push:
    branches:
      - dev
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run Go tests
        run: go test ./...

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  compose-smoke:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-tests
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.migrate
          load: true
          tags: locker-migrate
          cache-from: type=gha,scope=locker-migrate
          cache-to: type=gha,mode=max,scope=locker-migrate

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          load: true
          tags: locker-backend
          cache-from: type=gha,scope=locker-backend
          cache-to: type=gha,mode=max,scope=locker-backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: locker-frontend
          cache-from: type=gha,scope=locker-frontend
          cache-to: type=gha,mode=max,scope=locker-frontend

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Run migrations
        run: docker compose run --rm migrate

      - name: Start app containers
        run: docker compose up -d --no-build backend frontend

      - name: Check backend health
        run: docker compose exec -T backend curl -fsS http://localhost:8080/healthz

      - name: Check frontend
        run: curl -fsS http://localhost:8081 >/dev/null

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: project
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "ERROR: SERVER_APP_DIR secret is empty"
              exit 1
            fi
            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: SERVER_APP_DIR does not exist: $APP_DIR"
              exit 1
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh